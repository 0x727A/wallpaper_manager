name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
            build-command: npm run build -- --bundles dmg
          - os: windows-latest
            name: windows
            build-command: npm run build -- --bundles nsis

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: ${{ matrix.build-command }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"

          gh release delete "$tag" --yes || true
          git push --delete origin "$tag" || true
          git tag -f "$tag" "$GITHUB_SHA"
          git push --force origin "refs/tags/$tag"

          echo "Downloaded build files:"
          find release-assets -type f -print

          mkdir -p release-files
          find release-assets -type f \( -name "*.dmg" -o -name "*.exe" \) \
            -exec cp {} release-files/ \;

          mapfile -t files < <(find release-files -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .dmg or .exe installer assets found"
            exit 1
          fi

          gh release create "$tag" \
            --draft \
            --title "$tag" \
            --notes "Wallpaper Manager ${tag}"

          gh release upload "$tag" "${files[@]}" --clobber
